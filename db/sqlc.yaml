version: "2"
sql:
  - engine: "postgresql"
    queries: "query/oidc.sql"
    schema: "schema.sql"
    strict_function_checks: true
    gen:
      go:
        package: "oidc"
        out: "../internal/repository/oidc"
        emit_json_tags: true
        emit_prepared_queries: true
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
        overrides:
          - db_type: "jsonb"
            go_type: "encoding/json.RawMessage"
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "NullUUID"
  - engine: "postgresql"
    queries: "query/portal.sql"
    schema: "portal-schema.sql"
    strict_function_checks: true
    gen:
      go:
        package: "portal"
        out: "../internal/repository/portal"
        emit_json_tags: true
        emit_prepared_queries: true
        emit_interface: true
        emit_exact_table_names: false
        emit_empty_slices: true
