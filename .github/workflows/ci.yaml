name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Default to minimal permissions
permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - uses: golangci/golangci-lint-action@v9
        with:
          install-mode: none
          args: --config=.golangci.yml

  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Build
        run: go build -v ./...

      - name: Build Docker image
        run: docker build --target production -t portal-oidc:ci .

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [lint, build]
    permissions:
      contents: read
    services:
      oidc-db:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: oidc
          POSTGRES_USER: root
        ports:
          - 5433:5432
        options: >-
          --health-cmd="pg_isready -U root -d oidc"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      portal-db:
        image: postgres:18
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_DB: portal
          POSTGRES_USER: root
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U root -d portal"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Run tests
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
        env:
          POSTGRES_HOSTNAME: 127.0.0.1
          POSTGRES_PORT: "5433"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        continue-on-error: true
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}

  vulnerability:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Run Gosec Security Scanner
        run: gosec -exclude-generated -fmt sarif -out gosec.sarif ./...

      - name: Upload Gosec SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('gosec.sarif') != ''
        with:
          sarif_file: gosec.sarif
