services:
  mongodb:
    image: mongo:8.2.7
  httpd:
    image: ${CONFORMANCE_HTTPD_IMAGE}
    ports:
      - "8443:8443"
    depends_on:
      server:
        condition: service_healthy
  server:
    image: ${CONFORMANCE_SERVER_IMAGE}
    environment:
      - openid.mongodb.targetFeatureCompatibilityVersion=8.2
    command: >
      java
      -Djdk.tls.maxHandshakeMessageSize=65536
      -jar /server/fapi-test-suite.jar
      --fintechlabs.base_url=https://localhost.emobix.co.uk:8443
      --fintechlabs.devmode=true
      --fintechlabs.startredir=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - mongodb
    healthcheck:
      test: ["CMD", "curl", "-s", "http://localhost:8080/", "-o", "/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "500k"
        max-file: "5"
