services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    volumes:
      - .:/app:cached
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    ports:
      - "8080:8080"
    environment:
      - CONFIG_FILE=/app/config.yaml
      - TZ=Asia/Tokyo
      - OIDC_DATABASE__HOST=oidc
      - OIDC_DATABASE__PORT=5432
      - OIDC_PORTAL__DATABASE__HOST=portal
      - OIDC_PORTAL__DATABASE__PORT=5432
    depends_on:
      portal:
        condition: service_healthy
      oidc:
        condition: service_healthy
    restart: unless-stopped
    tty: true
    stdin_open: true

  portal:
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: portal
      POSTGRES_USER: root
      TZ: Asia/Tokyo
    volumes:
      - ./db/portal-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - portal-pg-data:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d portal"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  oidc:
    image: postgres:18
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_DB: oidc
      POSTGRES_USER: root
      TZ: Asia/Tokyo
    volumes:
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - oidc-pg-data:/var/lib/postgresql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d oidc"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  adminer:
    image: adminer:5.4.2-standalone
    environment:
      ADMINER_DEFAULT_SERVER: portal
      ADMINER_DESIGN: pepa-linha
    ports:
      - "3001:8080"
    depends_on:
      - portal
      - oidc
    restart: unless-stopped
    profiles:
      - tools

volumes:
  go-mod-cache:
  go-build-cache:
  portal-pg-data:
  oidc-pg-data:
